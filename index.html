<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 customization — моды и обучение</title>
    <style>
        :root {
            --bg-color: #050608; /* Глубокий благородный черный из теней фотографии */
            --card-bg: rgba(13, 16, 22, 0.6); /* Полупрозрачный стеклянный фон */
            --card-hover: rgba(22, 27, 36, 0.75); /* Изменение цвета при наведении */
            --primary: #ffffff; /* Белые контрастные акценты */
            --primary-glow: rgba(255, 255, 255, 0.25); /* Свечение кнопок */
            --secondary: #cccccc; /* Серебряный цвет */
            --text-main: #f5f6fa; /* Основной текст */
            --text-muted: #95a5a6; /* Вспомогательный серый текст */
            --border: rgba(255, 255, 255, 0.08); /* Тонкие стеклянные рамки */
            --border-hover: rgba(255, 255, 255, 0.35); /* Подсветка рамок */
        }

        /* Плавное поведение скролла и кастомный скроллбар */
        html {
            scroll-behavior: smooth;
        }
        
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #1c1f26;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        a {
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        /* Фиксированный фоновый рисунок собора с затемнением для идеальной читаемости */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(5, 6, 8, 0.4), rgba(5, 6, 8, 0.8)), url('bg.webp') no-repeat center top;
            background-size: cover;
            background-attachment: fixed;
            pointer-events: none;
        }

        /* Главный контейнер */
        .container {
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Эффект Glassmorphism навигации */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            margin-top: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: fadeInDown 1s ease forwards;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #b4b4b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo span {
            color: var(--primary);
            -webkit-text-fill-color: initial;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-weight: 500;
            color: var(--text-muted);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* Стильные кнопки под гамму */
        .btn {
            display: inline-block;
            background: #ffffff;
            color: #050608;
            padding: 16px 36px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px var(--primary-glow);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
